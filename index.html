<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APP ASUME</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      color: #38bdf8;
    }

    h2, h3 {
      color: #38bdf8;
      margin-top: 0;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 24px;
      font-size: 18px;
    }

    .intro-box {
      margin: 24px auto;
      padding: 18px;
      border: 1px solid #334155;
      border-radius: 12px;
      text-align: left;
      max-width: 360px;
      color: #e2e8f0;
      line-height: 1.8;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .login-form {
      margin-top: 28px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 4px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0b1220;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .secondary-btn {
      background: #f8fafc;
      color: #0f172a;
    }

    .message {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #f8fafc;
    }

    .success { color: #4ade80; }
    .error { color: #f87171; }
    .hidden { display: none !important; }

    .welcome {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.7);
    }

    .role-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #93c5fd;
      font-weight: bold;
      font-size: 14px;
    }

    .panel {
      margin-top: 20px;
      text-align: left;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      background: rgba(2, 6, 23, 0.35);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .menu-btn {
      width: 100%;
    }

    .view-box {
      margin-top: 20px;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.55);
      text-align: left;
    }

    .view-box p {
      color: #cbd5e1;
      line-height: 1.7;
    }

    .footer {
      margin-top: 28px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .user-line {
      margin-bottom: 8px;
      color: #f8fafc;
    }

    ul {
      margin-top: 10px;
      line-height: 1.8;
    }

    .top-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
      color: #e2e8f0;
      white-space: nowrap;
      vertical-align: top;
    }

    th {
      background: rgba(30, 41, 59, 0.8);
      color: #38bdf8;
    }

    .estado-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #334155;
    }

    .estado-activo {
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
    }

    .estado-pendiente {
      background: rgba(250, 204, 21, 0.12);
      color: #fde047;
    }

    .estado-dormido {
      background: rgba(96, 165, 250, 0.12);
      color: #93c5fd;
    }

    .estado-perdido {
      background: rgba(248, 113, 113, 0.12);
      color: #f87171;
    }

    .estado-baja {
      background: rgba(148, 163, 184, 0.12);
      color: #cbd5e1;
    }

    .loading {
      color: #93c5fd;
      font-style: italic;
    }

    .asociado-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .form-card {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      background: rgba(2, 6, 23, 0.35);
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .helper {
      color: #94a3b8;
      font-size: 13px;
      margin-top: -4px;
    }

    @media (max-width: 800px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 APP ASUME</h1>
    <p class="subtitle">La asociación empresarial del futuro empieza aquí</p>

    <div class="intro-box">
      ✔️ Gestión de asociados<br />
      ✔️ Tareas y seguimiento<br />
      ✔️ Subvenciones<br />
      ✔️ Marketplace local
    </div>

    <div id="loginSection">
      <form id="loginForm" class="login-form">
        <div>
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="pacoparejo@asume.net"
            required
          />
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Tu contraseña"
            required
          />
        </div>

        <button type="submit">Entrar</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <div id="welcomeSection" class="welcome hidden">
      <h2>Bienvenido a ASUME</h2>
      <p id="userInfo" class="user-line"></p>
      <div id="roleBadge" class="role-badge"></div>

      <div id="rolePanel" class="panel">
        <h3>Panel de acceso</h3>
        <p id="roleSummary"></p>

        <div id="menuButtons" class="menu-grid"></div>

        <div id="viewBox" class="view-box">
          <h3 id="viewTitle">Dashboard</h3>
          <div id="viewContent">
            <p>Selecciona una opción del panel para empezar.</p>
          </div>
        </div>
      </div>

      <div class="top-actions">
        <button id="homeBtn" class="secondary-btn">Inicio</button>
        <button id="logoutBtn" class="secondary-btn">Cerrar sesión</button>
      </div>
    </div>

    <p class="footer">Creado por Globalum Marketing 😏</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://ijsntfkhuunaauqvjeve.supabase.co';
    const supabaseKey = 'sb_publishable_PIbkEoS7eK8CdD4DtJcepQ_5I7JCmjm';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const loginSection = document.getElementById('loginSection');
    const welcomeSection = document.getElementById('welcomeSection');
    const userInfo = document.getElementById('userInfo');
    const logoutBtn = document.getElementById('logoutBtn');
    const homeBtn = document.getElementById('homeBtn');
    const roleBadge = document.getElementById('roleBadge');
    const roleSummary = document.getElementById('roleSummary');
    const menuButtons = document.getElementById('menuButtons');
    const viewTitle = document.getElementById('viewTitle');
    const viewContent = document.getElementById('viewContent');

    function showMessage(text, type = '') {
      message.textContent = text;
      message.className = 'message';
      if (type) message.classList.add(type);
    }

    function showLogin() {
      welcomeSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
      showMessage('');
    }

    function setView(title, html) {
      viewTitle.textContent = title;
      viewContent.innerHTML = html;
    }

    function getRoleSummary(role) {
      const map = {
        superadmin: 'Acceso total activado. Puedes controlar toda la APP ASUME.',
        presidente: 'Panel de Presidencia activo. Visión global y estratégica.',

        secretario: 'Panel de Secretaría activo. Reuniones, actas y seguimiento.',
        junta: 'Panel de Junta Directiva activo. Gestión compartida.',
        asociado: 'Panel de asociado activo. Acceso a tus recursos y datos.'

      return map[role] || 'Panel de asociado activo.';
    }

    function getMenuForRole(role) {
      const menus = {
        superadmin: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'usuarios', label: '👥 Usuarios y roles' },

          { key: 'marketplace', label: '🛒 Marketplace' }
        ],
        presidente: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'resumen', label: '📊 Resumen general' },
          { key: 'alertas', label: '🚨 Alertas' },
          { key: 'reuniones', label: '🗓️ Reuniones' }
        ],
        tesorero: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'cuotas', label: '💳 Cuotas' },
          { key: 'morosidad', label: '📉 Morosidad' },
          { key: 'remesas', label: '🏦 Remesas' }
        ],
        secretario: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'actas', label: '📝 Actas' },
          { key: 'reuniones', label: '🗓️ Reuniones' },
          { key: 'seguimiento', label: '📌 Seguimiento' }
        ],
        junta: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'documentos', label: '📂 Documentos' },
          { key: 'acciones', label: '⚙️ Acciones' },
          { key: 'tareas', label: '✅ Tareas' }
        ],
        asociado: [
          { key: 'dashboard', label: '🏠 Dashboard' },
          { key: 'ficha', label: '🪪 Mi ficha' },
          { key: 'pagos', label: '💳 Mis pagos' },
          { key: 'recursos', label: '📚 Recursos' }
        ]
      };

      return menus[role] || menus.asociado;
    }

    function getStaticViewContent(key, role) {
      const views = {
        dashboard: `
          <p>Este es el punto de control principal de la APP ASUME.</p>
          <ul>
            <li>Revisión rápida del estado general</li>
            <li>Accesos directos a módulos</li>

        `,
        usuarios: `

        `,
        tareas: `
          <p>Módulo de tareas y seguimiento interno.</p>
          <ul>
            <li>Tareas pendientes</li>
            <li>Responsables</li>
            <li>Estado y avance</li>
          </ul>
        `,
        contabilidad: `
          <p>Panel económico de la asociación.</p>
          <ul>
            <li>Cuotas</li>
            <li>Recibos</li>
            <li>Morosidad</li>
            <li>Remesas</li>
          </ul>
        `,
        subvenciones: `
          <p>Radar de subvenciones y ayudas.</p>
          <ul>
            <li>Ayudas abiertas</li>
            <li>Convocatorias futuras</li>
            <li>Seguimiento</li>
          </ul>
        `,
        marketplace: `
          <p>Espacio para el marketplace local tipo Amazon de barrio.</p>
          <ul>
            <li>Productos de asociados</li>
            <li>Ventas</li>
            <li>Entrega local</li>
          </ul>
        `,
        resumen: `
          <p>Visión ejecutiva para Presidencia.</p>
          <ul>
            <li>Estado general</li>
            <li>Actividad reciente</li>
            <li>Indicadores clave</li>
          </ul>
        `,
        alertas: `
          <p>Panel de alertas importantes.</p>
          <ul>
            <li>Pagos pendientes</li>
            <li>Tareas retrasadas</li>
            <li>Incidencias activas</li>
          </ul>
        `,
        reuniones: `
          <p>Espacio para reuniones, convocatorias y planificación.</p>
          <ul>
            <li>Calendario</li>

        `,
        cuotas: `
          <p>Control de cuotas mensuales y anuales.</p>
          <ul>
            <li>12 €/mes</li>

          </ul>
        `,
        morosidad: `
          <p>Seguimiento de asociados con pagos pendientes.</p>
          <ul>
            <li>Recordatorios</li>
            <li>Histórico</li>
            <li>Acciones de cobro</li>
          </ul>
        `,
        remesas: `
          <p>Gestión de cobros por domiciliación.</p>
          <ul>
            <li>Generación de remesa</li>
            <li>Estado de cobro</li>
            <li>Incidencias</li>
          </ul>
        `,
        actas: `
          <p>Panel de actas y acuerdos.</p>
          <ul>
            <li>Actas de reuniones</li>
            <li>Histórico</li>
            <li>Seguimiento de acuerdos</li>
          </ul>
        `,
        seguimiento: `
          <p>Seguimiento de acciones asignadas.</p>
          <ul>
            <li>Qué</li>
            <li>Quién</li>
            <li>Cuándo</li>
            <li>Resultado</li>
          </ul>
        `,
        documentos: `
          <p>Biblioteca interna de documentos.</p>
          <ul>
            <li>Archivos compartidos</li>
            <li>Documentación de junta</li>
            <li>Material interno</li>
          </ul>
        `,
        acciones: `
          <p>Acciones estratégicas en marcha.</p>
          <ul>
            <li>Campañas</li>
            <li>Seguimiento</li>
            <li>Prioridades</li>
          </ul>
        `,
        ficha: `
          <p>Ficha personal y empresarial del asociado.</p>
          <ul>
            <li>Datos básicos</li>
            <li>Información empresarial</li>
            <li>Visibilidad online</li>
          </ul>
        `,
        pagos: `
          <p>Consulta de pagos y estado económico.</p>
          <ul>
            <li>Último pago</li>
            <li>Próximo recibo</li>
            <li>Estado de cuenta</li>
          </ul>
        `,
        recursos: `

          </ul>
        `
      };

      return views[key] || `<p>Vista no disponible para el rol: <strong>${role}</strong>.</p>`;
    }

    function getEstadoClass(estado) {
      const valor = (estado || '').toLowerCase();

      if (valor === 'activo') return 'estado-badge estado-activo';
      if (valor === 'pendiente') return 'estado-badge estado-pendiente';
      if (valor === 'dormido') return 'estado-badge estado-dormido';
      if (valor === 'perdido') return 'estado-badge estado-perdido';
      if (valor === 'baja') return 'estado-badge estado-baja';

      return 'estado-badge';
    }

    async function renderAsociadosView() {
      setView('Asociados', '<p class="loading">Cargando asociados...</p>');

      const { data, error } = await supabaseClient
        .from('asociados')
        .select('id, contacto, cargo, telefono, empresa, actividad, direccion, email, estado')
        .order('id', { ascending: true });

      if (error) {
        setView('Asociados', `
          <p class="error">Error al cargar asociados: ${error.message}</p>
        `);
        return;
      }

      if (!data || data.length === 0) {
        setView('Asociados', '<p>No hay asociados registrados todavía.</p>');
        return;
      }

      const rows = data.map(item => `
        <tr>
          <td>${item.id}</td>
          <td>${item.contacto || ''}</td>
          <td>${item.cargo || ''}</td>
          <td>${item.telefono || ''}</td>
          <td>${item.empresa || ''}</td>
          <td>${item.actividad || ''}</td>
          <td>${item.direccion || ''}</td>
          <td>${item.email || ''}</td>
          <td><span class="${getEstadoClass(item.estado)}">${item.estado || ''}</span></td>
        </tr>
      `).join('');

      setView('Asociados', `
        <div class="asociado-header">
          <div>
            <p style="margin:0;">Listado real de asociados cargado desde Supabase.</p>
          </div>
          <div>
            <button id="nuevoAsociadoBtn">➕ Nuevo asociado</button>
          </div>
        </div>

        <div id="nuevoAsociadoFormWrap" class="form-card hidden">
          <h3>Nuevo asociado</h3>
          <form id="nuevoAsociadoForm">
            <div class="form-grid">
              <div>
                <label for="nuevo_contacto">Contacto</label>
                <input type="text" id="nuevo_contacto" required />
              </div>

              <div>
                <label for="nuevo_cargo">Cargo</label>
                <input type="text" id="nuevo_cargo" />
              </div>

              <div>
                <label for="nuevo_telefono">Teléfono</label>
                <input type="text" id="nuevo_telefono" required />
              </div>

              <div>
                <label for="nuevo_empresa">Empresa</label>
                <input type="text" id="nuevo_empresa" required />
              </div>

              <div>
                <label for="nuevo_actividad">Actividad</label>
                <input type="text" id="nuevo_actividad" />
              </div>

              <div>
                <label for="nuevo_email">Email</label>
                <input type="email" id="nuevo_email" />
              </div>

              <div class="full-width">
                <label for="nuevo_direccion">Dirección</label>
                <input type="text" id="nuevo_direccion" />
              </div>

              <div>
                <label for="nuevo_estado">Estado</label>
                <select id="nuevo_estado">
                  <option value="activo">activo</option>
                  <option value="pendiente">pendiente</option>
                  <option value="dormido">dormido</option>
                  <option value="perdido">perdido</option>
                  <option value="baja">baja</option>
                </select>
              </div>
            </div>

            <div class="helper">Formulario simple: Contacto, Cargo, Teléfono, Empresa, Actividad, Dirección, Email.</div>

            <div class="top-actions" style="justify-content:flex-start; margin-top:16px;">
              <button type="submit">Guardar asociado</button>
              <button type="button" id="cancelarNuevoAsociadoBtn" class="secondary-btn">Cancelar</button>
            </div>
          </form>

          <div id="nuevoAsociadoMsg" class="message"></div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Contacto</th>
                <th>Cargo</th>
                <th>Teléfono</th>
                <th>Empresa</th>
                <th>Actividad</th>
                <th>Dirección</th>
                <th>Email</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `);

      const nuevoAsociadoBtn = document.getElementById('nuevoAsociadoBtn');
      const nuevoAsociadoFormWrap = document.getElementById('nuevoAsociadoFormWrap');
      const cancelarNuevoAsociadoBtn = document.getElementById('cancelarNuevoAsociadoBtn');
      const nuevoAsociadoForm = document.getElementById('nuevoAsociadoForm');
      const nuevoAsociadoMsg = document.getElementById('nuevoAsociadoMsg');

      nuevoAsociadoBtn.addEventListener('click', () => {
        nuevoAsociadoFormWrap.classList.remove('hidden');
      });

      cancelarNuevoAsociadoBtn.addEventListener('click', () => {
        nuevoAsociadoFormWrap.classList.add('hidden');
        nuevoAsociadoMsg.textContent = '';
        nuevoAsociadoForm.reset();
      });

      nuevoAsociadoForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        nuevoAsociadoMsg.textContent = 'Guardando asociado...';
        nuevoAsociadoMsg.className = 'message';

        const payload = {
          contacto: document.getElementById('nuevo_contacto').value.trim(),
          cargo: document.getElementById('nuevo_cargo').value.trim(),
          telefono: document.getElementById('nuevo_telefono').value.trim(),
          empresa: document.getElementById('nuevo_empresa').value.trim(),
          actividad: document.getElementById('nuevo_actividad').value.trim(),
          direccion: document.getElementById('nuevo_direccion').value.trim(),
          email: document.getElementById('nuevo_email').value.trim(),
          estado: document.getElementById('nuevo_estado').value
        };

        const { error: insertError } = await supabaseClient
          .from('asociados')
          .insert([payload]);

        if (insertError) {
          nuevoAsociadoMsg.textContent = 'Error al guardar: ' + insertError.message;
          nuevoAsociadoMsg.className = 'message error';
          return;
        }

        nuevoAsociadoMsg.textContent = 'Asociado guardado correctamente';
        nuevoAsociadoMsg.className = 'message success';

        setTimeout(async () => {
          await renderAsociadosView();
        }, 500);
      });
    }

    function renderMenu(role) {
      const items = getMenuForRole(role);
      menuButtons.innerHTML = '';

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.textContent = item.label;

        btn.addEventListener('click', async () => {
          if (item.key === 'asociados') {
            await renderAsociadosView();
            return;
          }

          setView(item.label.replace(/^[^\s]+\s/, ''), getStaticViewContent(item.key, role));
        });

        menuButtons.appendChild(btn);
      });
    }

    async function getUserProfile(userId) {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('email, role')
        .eq('id', userId)
        .single();

      if (error) {
        console.error('Error al leer perfil:', error);
        return null;
      }

      return data;
    }

    async function showWelcome(user) {
      loginSection.classList.add('hidden');
      welcomeSection.classList.remove('hidden');

      const profile = await getUserProfile(user.id);

      const email = profile?.email || user.email;
      const role = profile?.role || 'asociado';

      userInfo.textContent = `Has iniciado sesión como: ${email}`;
      roleBadge.textContent = `Rol: ${role}`;
      roleSummary.textContent = getRoleSummary(role);

      renderMenu(role);
      setView('Dashboard', getStaticViewContent('dashboard', role));
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session && data.session.user) {
        await showWelcome(data.session.user);
      } else {
        showLogin();
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      showMessage('Entrando...');

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage('Error: ' + error.message, 'error');
        return;
      }

      showMessage('Login correcto', 'success');
      await showWelcome(data.user);
    });

    logoutBtn.addEventListener('click', async () => {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        showMessage('Error al cerrar sesión: ' + error.message, 'error');
        return;
      }

      showLogin();
    });

    homeBtn.addEventListener('click', async () => {
      const { data } = await supabaseClient.auth.getSession();
      const role = data?.session?.user
        ? (await getUserProfile(data.session.user.id))?.role || 'asociado'
        : 'asociado';

      setView('Dashboard', getStaticViewContent('dashboard', role));
    });

    checkSession();
  </script>
</body>
</html>
