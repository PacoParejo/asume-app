<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 1200px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      color: #38bdf8;
    }

    h2, h3 {
      color: #38bdf8;
      margin-top: 0;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 24px;
      font-size: 18px;
    }

    .intro-box {
      margin: 24px auto;
      padding: 18px;
      border: 1px solid #334155;
      border-radius: 12px;
      text-align: left;
      max-width: 360px;
      color: #e2e8f0;
      line-height: 1.8;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .login-form {
      margin-top: 28px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 4px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0b1220;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);

      border-radius: 10px;

      color: #0f172a;
      font-weight: bold;
      font-size: 15px;

    async function archivarYEliminarAsociado(asociado) {
      const payloadArchivo = {
        contacto: asociado.contacto || '',
        cargo: asociado.cargo || '',
        telefono: asociado.telefono || '',
        empresa: asociado.empresa || '',
        actividad: asociado.actividad || '',
        direccion: asociado.direccion || '',
        email: asociado.email || '',
        estado: asociado.estado || 'baja',
        user_id: asociado.user_id || null
      };

      const { error: archivoError } = await supabaseClient
        .from('asociados_archivo')
        .insert([payloadArchivo]);

      if (archivoError) {
        return { ok: false, error: 'Error al archivar: ' + archivoError.message };
      }

      const { error: deleteError } = await supabaseClient
        .from('asociados')
        .delete()
        .eq('id', asociado.id);

      if (deleteError) {
        return { ok: false, error: 'Se archivó, pero no se pudo eliminar: ' + deleteError.message };
      }

      return { ok: true };
    }

      const formHTML = mostrarFormulario ? getAsociadoFormHTML(modo, asociado || {}) : '';

            <td>${item.direccion || ''}</td>
            <td>${item.email || ''}</td>
            <td><span class="${getEstadoClass(item.estado)}">${item.estado || ''}</span></td>
            <td>
              <div class="table-actions">
                <button class="secondary-btn editar-btn" data-id="${item.id}">Editar</button>
                <button class="danger-btn baja-btn" data-id="${item.id}">Dar de baja</button>
                ${botonEliminar}
              </div>
            </td>
          </tr>
        `;
      }).join('');

      setView('Asociados', `
        <div class="asociado-header">
          <div>
            <p style="margin:0;">Listado real de asociados cargado desde Supabase.</p>
          </div>
          <div>
            <button id="nuevoAsociadoBtn">➕ Nuevo asociado</button>
          </div>
        </div>

        ${formHTML}

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Contacto</th>
                <th>Cargo</th>
                <th>Teléfono</th>
                <th>Empresa</th>
                <th>Actividad</th>
                <th>Dirección</th>
                <th>Email</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${rows || '<tr><td colspan="10">No hay asociados registrados todavía.</td></tr>'}
            </tbody>
          </table>
        </div>
      `);

      const nuevoAsociadoBtn = document.getElementById('nuevoAsociadoBtn');
      nuevoAsociadoBtn.addEventListener('click', async () => {
        await renderAsociadosView(true, 'nuevo');
      });

      const cancelarFormBtn = document.getElementById('cancelarFormBtn');
      if (cancelarFormBtn) {
        cancelarFormBtn.addEventListener('click', async () => {
          await renderAsociadosView(false);
        });
      }

      const asociadoForm = document.getElementById('asociadoForm');
      if (asociadoForm) {
        asociadoForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const formMsg = document.getElementById('asociadoFormMsg');
          formMsg.textContent = modo === 'editar' ? 'Guardando cambios...' : 'Guardando asociado...';
          formMsg.className = 'message';

          const payload = {
            contacto: document.getElementById('contacto').value.trim(),
            cargo: document.getElementById('cargo').value.trim(),
            telefono: document.getElementById('telefono').value.trim(),
            empresa: document.getElementById('empresa').value.trim(),
            actividad: document.getElementById('actividad').value.trim(),
            direccion: document.getElementById('direccion').value.trim(),
            email: document.getElementById('email_asociado').value.trim(),
            estado: document.getElementById('estado').value
          };

          let response;

          if (modo === 'editar' && asociado?.id) {
            response = await supabaseClient
              .from('asociados')
              .update(payload)
              .eq('id', asociado.id);
          } else {
            response = await supabaseClient
              .from('asociados')
              .insert([payload]);
          }

          if (response.error) {
            formMsg.textContent = 'Error al guardar: ' + response.error.message;
            formMsg.className = 'message error';
            return;
          }

          formMsg.textContent = modo === 'editar'
            ? 'Cambios guardados correctamente'
            : 'Asociado guardado correctamente';
          formMsg.className = 'message success';

          setTimeout(async () => {
            await renderAsociadosView(false);
          }, 500);
        });
      }

      const editarBtns = document.querySelectorAll('.editar-btn');
      editarBtns.forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = Number(btn.dataset.id);
          const asociadoEncontrado = data.find(item => item.id === id);
          await renderAsociadosView(true, 'editar', asociadoEncontrado);
        });
      });

      const bajaBtns = document.querySelectorAll('.baja-btn');
      bajaBtns.forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = Number(btn.dataset.id);
          const ok = confirm('¿Seguro que quieres dar de baja este asociado?');
          if (!ok) return;

          const { error: bajaError } = await supabaseClient
            .from('asociados')
            .update({ estado: 'baja' })
            .eq('id', id);

          if (bajaError) {
            alert('Error al dar de baja: ' + bajaError.message);
            return;
          }

          await renderAsociadosView(false);
        });
      });

      const eliminarBtns = document.querySelectorAll('.eliminar-btn');
      eliminarBtns.forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = Number(btn.dataset.id);
          const asociadoEncontrado = data.find(item => item.id === id);
          if (!asociadoEncontrado) return;

          const ok = confirm('Esto archivará el asociado y luego lo eliminará definitivamente de la tabla activa. ¿Continuar?');
          if (!ok) return;

          const resultado = await archivarYEliminarAsociado(asociadoEncontrado);

          if (!resultado.ok) {
            alert(resultado.error);
            return;
          }

          await renderAsociadosView(false);
        });
      });
    }

    function renderMenu(role) {
      const items = getMenuForRole(role);
      menuButtons.innerHTML = '';

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.textContent = item.label;

        btn.addEventListener('click', async () => {
          if (item.key === 'asociados') {
            await renderAsociadosView(false);
            return;
          }

          setView(item.label.replace(/^[^\s]+\s/, ''), getStaticViewContent(item.key, role));
        });

        menuButtons.appendChild(btn);
      });
    }

    async function getUserProfile(userId) {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('email, role')
        .eq('id', userId)
        .single();

      if (error) {
        console.error('Error al leer perfil:', error);
        return null;
      }

      return data;
    }

    async function showWelcome(user) {
      loginSection.classList.add('hidden');
      welcomeSection.classList.remove('hidden');

      const profile = await getUserProfile(user.id);

      const email = profile?.email || user.email;
      const role = profile?.role || 'asociado';

      userInfo.textContent = `Has iniciado sesión como: ${email}`;
      roleBadge.textContent = `Rol: ${role}`;
      roleSummary.textContent = getRoleSummary(role);

      renderMenu(role);
      setView('Dashboard', getStaticViewContent('dashboard', role));
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session && data.session.user) {
        await showWelcome(data.session.user);
      } else {
        showLogin();
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      showMessage('Entrando...');

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage('Error: ' + error.message, 'error');
        return;
      }

      showMessage('Login correcto', 'success');
      await showWelcome(data.user);
    });

    logoutBtn.addEventListener('click', async () => {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        showMessage('Error al cerrar sesión: ' + error.message, 'error');
        return;
      }

      showLogin();
    });

    homeBtn.addEventListener('click', async () => {
      const { data } = await supabaseClient.auth.getSession();
      const role = data?.session?.user
        ? (await getUserProfile(data.session.user.id))?.role || 'asociado'
        : 'asociado';

      setView('Dashboard', getStaticViewContent('dashboard', role));
    });

    checkSession();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
