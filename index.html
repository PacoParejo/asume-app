<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APP ASUME</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="card">
    <h1>🚀 APP ASUME</h1>
    <p class="subtitle">La asociación empresarial del futuro empieza aquí</p>

    <div class="intro-box">
      ✔️ Gestión de asociados<br />
      ✔️ Tareas y seguimiento<br />
      ✔️ Subvenciones<br />
      ✔️ Marketplace local
    </div>

    <div id="loginSection">
      <form id="loginForm" class="login-form">
        <div>
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="pacoparejo@asume.net"
            required
          />
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Tu contraseña"
            required
          />
        </div>

        <button type="submit">Entrar</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <div id="welcomeSection" class="welcome hidden">
      <h2>Bienvenido a ASUME</h2>
      <p id="userInfo" class="user-line"></p>
      <div id="roleBadge" class="role-badge"></div>

      <div id="rolePanel" class="panel">
        <h3>Panel de acceso</h3>
        <p id="roleSummary"></p>

        <div id="menuButtons" class="menu-grid"></div>

        <div id="viewBox" class="view-box">
          <h3 id="viewTitle">Dashboard</h3>
          <div id="viewContent">
            <p>Selecciona una opción del panel para empezar.</p>
          </div>
        </div>
      </div>

      <div class="top-actions">
        <button id="homeBtn" class="secondary-btn">Inicio</button>
        <button id="logoutBtn" class="secondary-btn">Cerrar sesión</button>
      </div>
    </div>

    <p class="footer">Creado por Globalum Marketing 😏</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
