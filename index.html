<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APP ASUME</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      color: #38bdf8;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 24px;
      font-size: 18px;
    }

    .box {
      margin: 24px auto;
      padding: 18px;
      border: 1px solid #334155;
      border-radius: 12px;
      text-align: left;
      max-width: 360px;
      color: #e2e8f0;
      line-height: 1.8;
    }

    form {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0b1220;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      margin-top: 8px;
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .message {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #f8fafc;
    }

    .success {
      color: #4ade80;
    }

    .error {
      color: #f87171;
    }

    .hidden {
      display: none;
    }

    .welcome {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.7);
    }

    .welcome h2 {
      color: #38bdf8;
      margin-top: 0;
    }

    .logout-btn {
      background: #f8fafc;
      color: #0f172a;
      margin-top: 16px;
    }

    .role-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #93c5fd;
      font-weight: bold;
      font-size: 14px;
    }

    .panel {
      margin-top: 20px;
      text-align: left;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      background: rgba(2, 6, 23, 0.35);
    }

    .panel h3 {
      margin-top: 0;
      color: #38bdf8;
    }

    .footer {
      margin-top: 28px;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 APP ASUME</h1>
    <p class="subtitle">La asociación empresarial del futuro empieza aquí</p>

    <div class="box">
      ✔️ Gestión de asociados<br />
      ✔️ Tareas y seguimiento<br />
      ✔️ Subvenciones<br />
      ✔️ Marketplace local
    </div>

    <div id="loginSection">
      <form id="loginForm">
        <div>
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="pacoparejo@asume.net"
            required
          />
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Tu contraseña"
            required
          />
        </div>

        <button type="submit">Entrar</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <div id="welcomeSection" class="welcome hidden">
      <h2>Bienvenido a ASUME</h2>
      <p id="userInfo"></p>
      <div id="roleBadge" class="role-badge"></div>

      <div id="rolePanel" class="panel">
        <h3>Panel de acceso</h3>
        <div id="roleContent"></div>
      </div>

      <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
    </div>

    <p class="footer">Creado por Globalum Marketing 😏</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://ijsntfkhuunaauqvjeve.supabase.co';
    const supabaseKey = 'sb_publishable_PIbkEoS7eK8CdD4DtJcepQ_5I7JCmjm';

    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const loginSection = document.getElementById('loginSection');
    const welcomeSection = document.getElementById('welcomeSection');
    const userInfo = document.getElementById('userInfo');
    const logoutBtn = document.getElementById('logoutBtn');
    const roleBadge = document.getElementById('roleBadge');
    const roleContent = document.getElementById('roleContent');

    function showMessage(text, type = '') {
      message.textContent = text;
      message.className = 'message';
      if (type) message.classList.add(type);
    }

    function getRoleContent(role) {
      if (role === 'superadmin') {
        return `
          <strong>Acceso total activado.</strong><br><br>
          Puedes gestionar:
          <ul>
            <li>Usuarios y roles</li>
            <li>Asociados</li>
            <li>Tareas</li>
            <li>Contabilidad</li>
            <li>Subvenciones</li>
            <li>Marketplace</li>
          </ul>
        `;
      }

      if (role === 'presidente') {
        return `
          <strong>Panel de Presidencia.</strong><br><br>
          Puedes ver:
          <ul>
            <li>Resumen general</li>
            <li>Alertas estratégicas</li>
            <li>Estado de la asociación</li>
          </ul>
        `;
      }

      if (role === 'tesorero') {
        return `
          <strong>Panel de Tesorería.</strong><br><br>
          Puedes ver:
          <ul>
            <li>Cuotas</li>
            <li>Recibos pendientes</li>
            <li>Morosidad</li>
            <li>Remesas</li>
          </ul>
        `;
      }

      if (role === 'secretario') {
        return `
          <strong>Panel de Secretaría.</strong><br><br>
          Puedes ver:
          <ul>
            <li>Reuniones</li>
            <li>Actas</li>
            <li>Seguimiento de tareas</li>
          </ul>
        `;
      }

      if (role === 'junta') {
        return `
          <strong>Panel de Junta Directiva.</strong><br><br>
          Puedes ver:
          <ul>
            <li>Tareas compartidas</li>
            <li>Documentación interna</li>
            <li>Acciones en curso</li>
          </ul>
        `;
      }

      return `
        <strong>Panel de asociado.</strong><br><br>
        Puedes ver:
        <ul>
          <li>Tu ficha</li>
          <li>Tus pagos</li>
          <li>Noticias y recursos</li>
        </ul>
      `;
    }

    async function getUserProfile(userId) {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('email, role')
        .eq('id', userId)
        .single();

      if (error) {
        console.error('Error al leer perfil:', error);
        return null;
      }

      return data;
    }

    async function showWelcome(user) {
      loginSection.classList.add('hidden');
      welcomeSection.classList.remove('hidden');

      const profile = await getUserProfile(user.id);

      const email = profile?.email || user.email;
      const role = profile?.role || 'asociado';

      userInfo.textContent = `Has iniciado sesión como: ${email}`;
      roleBadge.textContent = `Rol: ${role}`;
      roleContent.innerHTML = getRoleContent(role);
    }

    function showLogin() {
      welcomeSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
      showMessage('');
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session && data.session.user) {
        await showWelcome(data.session.user);
      } else {
        showLogin();
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      showMessage('Entrando...');

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage('Error: ' + error.message, 'error');
        return;
      }

      showMessage('Login correcto', 'success');
      await showWelcome(data.user);
    });

    logoutBtn.addEventListener('click', async () => {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        showMessage('Error al cerrar sesión: ' + error.message, 'error');
        return;
      }

      showLogin();
    });

    checkSession();
  </script>
</body>
</html>
